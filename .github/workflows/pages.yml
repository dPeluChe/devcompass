name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'docs/screenshots/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble landing site
        run: |
          mkdir -p _site
          cp -r landing/* _site/
          mkdir -p _site/screenshots
          if compgen -G "docs/screenshots/*.png" > /dev/null; then
            cp docs/screenshots/*.png _site/screenshots/
          else
            echo "No screenshots in docs/screenshots yet — landing will show broken images until they are added."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
